name: Medical Dictation Pipeline

on:
  pull_request:
    branches:
      - main
      - develop
      - custome_template
  push:
    branches:
      - main
      - develop
      - custome_template
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Optional deployment target"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - uat-win
          - prod-win

defaults:
  run:
    working-directory: medical-dictation

jobs:
  mac-dev-validate:
    name: mac-dev validation
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Backend tests
        run: |
          python -m unittest tests/test_audio_config.py
          python -m compileall app tests
        working-directory: medical-dictation/backend

      - name: Frontend install
        run: pnpm install --frozen-lockfile
        working-directory: medical-dictation/frontend

      - name: Frontend typecheck
        run: pnpm exec tsc --noEmit
        working-directory: medical-dictation/frontend

      - name: Frontend build
        run: pnpm build
        working-directory: medical-dictation/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/audio

  win-dev-validate:
    name: win-dev validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Backend tests
        shell: pwsh
        run: |
          python -m unittest tests/test_audio_config.py
          python -m compileall app tests
        working-directory: medical-dictation/backend

      - name: Frontend install
        run: pnpm install --frozen-lockfile
        working-directory: medical-dictation/frontend

      - name: Frontend typecheck
        run: pnpm exec tsc --noEmit
        working-directory: medical-dictation/frontend

      - name: Frontend build
        run: pnpm build
        working-directory: medical-dictation/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/audio

  package-deployment:
    name: package deployment artifact
    runs-on: ubuntu-latest
    needs:
      - mac-dev-validate
      - win-dev-validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: medical-dictation-source
          retention-days: 14
          path: |
            medical-dictation/**
            AGENTS.md
            !medical-dictation/frontend/node_modules/**
            !medical-dictation/frontend/.next/**
            !medical-dictation/frontend/.env.production
            !medical-dictation/frontend/tsconfig.tsbuildinfo
            !medical-dictation/backend/.env
            !medical-dictation/backend/.venv/**
            !medical-dictation/backend/venv/**
            !medical-dictation/backend/data/**

  deploy-uat-win:
    name: deploy uat-win
    runs-on:
      - self-hosted
      - Windows
      - uat-win
    needs: package-deployment
    environment: UAT
    if: >
      github.event_name == 'workflow_dispatch' && inputs.target_environment == 'uat-win' ||
      github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/custome_template')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: medical-dictation-source
          path: artifact

      - name: Deploy to UAT Windows host
        shell: pwsh
        env:
          BACKEND_ENV_CONTENT: ${{ secrets.UAT_BACKEND_ENV }}
          FRONTEND_ENV_CONTENT: ${{ secrets.UAT_FRONTEND_ENV }}
          WIN_INSTALL_ROOT: ${{ vars.WIN_INSTALL_ROOT }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
          FRONTEND_SERVICE_NAME: ${{ vars.FRONTEND_SERVICE_NAME }}
        run: |
          $installRoot = if ($env:WIN_INSTALL_ROOT) { $env:WIN_INSTALL_ROOT } else { "C:\Apps\medical-dictation" }
          $backendService = if ($env:BACKEND_SERVICE_NAME) { $env:BACKEND_SERVICE_NAME } else { "MedDictateBackendUAT" }
          $frontendService = if ($env:FRONTEND_SERVICE_NAME) { $env:FRONTEND_SERVICE_NAME } else { "MedDictateFrontendUAT" }
          .\artifact\medical-dictation\scripts\run.ps1 uat-win `
            -SourceDir ".\artifact\medical-dictation" `
            -InstallRoot $installRoot `
            -BackendEnvContent $env:BACKEND_ENV_CONTENT `
            -FrontendEnvContent $env:FRONTEND_ENV_CONTENT `
            -BackendServiceName $backendService `
            -FrontendServiceName $frontendService

  deploy-prod-win:
    name: deploy prod-win
    runs-on:
      - self-hosted
      - Windows
      - prod-win
    needs: package-deployment
    environment: Production
    if: >
      github.event_name == 'workflow_dispatch' && inputs.target_environment == 'prod-win' ||
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: medical-dictation-source
          path: artifact

      - name: Deploy to Production Windows host
        shell: pwsh
        env:
          BACKEND_ENV_CONTENT: ${{ secrets.PROD_BACKEND_ENV }}
          FRONTEND_ENV_CONTENT: ${{ secrets.PROD_FRONTEND_ENV }}
          WIN_INSTALL_ROOT: ${{ vars.WIN_INSTALL_ROOT }}
          BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
          FRONTEND_SERVICE_NAME: ${{ vars.FRONTEND_SERVICE_NAME }}
        run: |
          $installRoot = if ($env:WIN_INSTALL_ROOT) { $env:WIN_INSTALL_ROOT } else { "C:\Apps\medical-dictation" }
          $backendService = if ($env:BACKEND_SERVICE_NAME) { $env:BACKEND_SERVICE_NAME } else { "MedDictateBackendProd" }
          $frontendService = if ($env:FRONTEND_SERVICE_NAME) { $env:FRONTEND_SERVICE_NAME } else { "MedDictateFrontendProd" }
          .\artifact\medical-dictation\scripts\run.ps1 prod-win `
            -SourceDir ".\artifact\medical-dictation" `
            -InstallRoot $installRoot `
            -BackendEnvContent $env:BACKEND_ENV_CONTENT `
            -FrontendEnvContent $env:FRONTEND_ENV_CONTENT `
            -BackendServiceName $backendService `
            -FrontendServiceName $frontendService
