<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Dictation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            transition: background 0.3s;
        }

        .status-indicator.connected {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .status-indicator.recording {
            background: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #666;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #connectBtn {
            background: #667eea;
            color: white;
        }

        #connectBtn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #recordBtn {
            background: #ef4444;
            color: white;
        }

        #recordBtn:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        #recordBtn.recording {
            background: #dc2626;
            animation: pulse-btn 1.5s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        #clearBtn {
            background: #6b7280;
            color: white;
            flex: 0.5;
        }

        #clearBtn:hover:not(:disabled) {
            background: #4b5563;
        }

        .transcription-box {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        .transcription-box:empty::before {
            content: "Your transcription will appear here...";
            color: #9ca3af;
            font-style: italic;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info {
            background: #dbeafe;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Scrollbar styling */
        .transcription-box::-webkit-scrollbar {
            width: 8px;
        }

        .transcription-box::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .transcription-box::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .transcription-box::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Medical Dictation</h1>
        <p class="subtitle">Real-time voice transcription with VAD-powered Whisper AI</p>

        <div class="error" id="errorBox"></div>
        
        <div class="info">
            <strong>✨ New Features:</strong> Real-time VAD • Dynamic buffering • Overlap prevention • 40-60% faster
        </div>

        <div class="status">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">Disconnected</div>
        </div>

        <div class="controls">
            <button id="connectBtn">Connect</button>
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div class="transcription-box" id="transcriptionBox"></div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="transcriptionCount">0</div>
                <div class="stat-label">Transcriptions</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="duration">0s</div>
                <div class="stat-label">Duration</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="efficiency">0%</div>
                <div class="stat-label">Efficiency</div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const WS_URL = 'ws://127.0.0.1:8000/ws/audio';  // FIXED: Changed from /ws/dictate to /ws/audio
        const AUDIO_SAMPLE_RATE = 16000;
        const AUDIO_CHUNK_SIZE = 4096; // ~256ms chunks for better VAD detection

        // State
        let websocket = null;
        let mediaRecorder = null;
        let audioContext = null;
        let audioStream = null;
        let isRecording = false;
        let startTime = null;
        let durationInterval = null;
        let processor = null;

        // Stats
        let stats = {
            words: 0,
            transcriptions: 0,
            duration: 0,
            efficiency: 0
        };

        // DOM Elements
        const connectBtn = document.getElementById('connectBtn');
        const recordBtn = document.getElementById('recordBtn');
        const clearBtn = document.getElementById('clearBtn');
        const transcriptionBox = document.getElementById('transcriptionBox');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');
        const wordCount = document.getElementById('wordCount');
        const transcriptionCount = document.getElementById('transcriptionCount');
        const duration = document.getElementById('duration');
        const efficiency = document.getElementById('efficiency');

        // Event Listeners
        connectBtn.addEventListener('click', toggleConnection);
        recordBtn.addEventListener('click', toggleRecording);
        clearBtn.addEventListener('click', clearTranscription);

        // WebSocket Functions
        function toggleConnection() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            showError('');
            updateStatus('Connecting...', false);

            try {
                websocket = new WebSocket(WS_URL);

                websocket.onopen = () => {
                    console.log('WebSocket connected');
                    updateStatus('Connected', true);
                    connectBtn.textContent = 'Disconnect';
                    connectBtn.style.background = '#ef4444';
                    recordBtn.disabled = false;
                };

                websocket.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    handleMessage(message);
                };

                websocket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    showError('Connection error. Make sure the backend is running on port 8000.');
                };

                websocket.onclose = () => {
                    console.log('WebSocket closed');
                    updateStatus('Disconnected', false);
                    connectBtn.textContent = 'Connect';
                    connectBtn.style.background = '#667eea';
                    recordBtn.disabled = true;
                    if (isRecording) {
                        stopRecording();
                    }
                };
            } catch (error) {
                console.error('Connection failed:', error);
                showError('Failed to connect: ' + error.message);
            }
        }

        function disconnect() {
            if (websocket) {
                if (isRecording) {
                    stopRecording();
                }
                websocket.close();
                websocket = null;
            }
        }

        function handleMessage(message) {
            console.log('Received message:', message);

            switch (message.type) {
                case 'connected':
                    console.log('Connection confirmed:', message.message);
                    console.log('Config:', message.config);
                    
                    // Show VAD status
                    if (message.config && message.config.vad_enabled) {
                        console.log('✓ VAD enabled - using Silero for real-time speech detection');
                    } else {
                        console.log('⚠ VAD disabled - using fallback RMS detection');
                    }
                    break;

                case 'transcription':
                    addTranscription(message.text);
                    stats.transcriptions++;
                    updateStats();
                    break;

                case 'stats':
                    console.log('Session stats:', message.data);
                    // Update efficiency if available
                    if (message.data && message.data.efficiency_percent !== undefined) {
                        stats.efficiency = message.data.efficiency_percent;
                        updateStats();
                    }
                    break;

                case 'error':
                    showError(message.message);
                    break;

                case 'control_ack':
                    console.log('Control acknowledged:', message);
                    break;

                default:
                    console.log('Unknown message type:', message.type);
            }
        }

        // Audio Recording Functions
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                showError('');

                // Request microphone access with optimal settings
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        sampleRate: AUDIO_SAMPLE_RATE,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                // Create audio context for resampling
                audioContext = new AudioContext({ sampleRate: AUDIO_SAMPLE_RATE });
                const source = audioContext.createMediaStreamSource(audioStream);
                
                // IMPROVED: Use smaller buffer for better VAD responsiveness
                processor = audioContext.createScriptProcessor(AUDIO_CHUNK_SIZE, 1, 1);
                
                processor.onaudioprocess = (e) => {
                    if (!isRecording) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    
                    // Convert float32 to int16 (PCM)
                    const int16Data = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }

                    // Send to WebSocket as binary
                    if (websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(int16Data.buffer);
                    }
                };

                source.connect(processor);
                processor.connect(audioContext.destination);

                // Update UI
                isRecording = true;
                recordBtn.textContent = 'Stop Recording';
                recordBtn.classList.add('recording');
                statusIndicator.classList.add('recording');
                statusText.textContent = 'Recording... (VAD active)';

                // Start duration timer
                startTime = Date.now();
                durationInterval = setInterval(updateDuration, 1000);

                console.log('Recording started with VAD');
                console.log('Chunk size:', AUDIO_CHUNK_SIZE, 'samples (~' + Math.round(AUDIO_CHUNK_SIZE / AUDIO_SAMPLE_RATE * 1000) + 'ms)');

            } catch (error) {
                console.error('Failed to start recording:', error);
                showError('Microphone access denied or not available: ' + error.message);
            }
        }

        function stopRecording() {
            isRecording = false;

            // Disconnect processor
            if (processor) {
                processor.disconnect();
                processor = null;
            }

            // Stop audio context
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            // Stop media stream
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
                audioStream = null;
            }

            // Stop duration timer
            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }

            // Send flush command to get final transcription
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify({ type: 'flush' }));
                
                // Request final stats
                setTimeout(() => {
                    if (websocket && websocket.readyState === WebSocket.OPEN) {
                        websocket.send(JSON.stringify({ type: 'stats' }));
                    }
                }, 500);
            }

            // Update UI
            recordBtn.textContent = 'Start Recording';
            recordBtn.classList.remove('recording');
            statusIndicator.classList.remove('recording');
            statusText.textContent = 'Connected';

            console.log('Recording stopped');
        }

        // UI Functions
        function addTranscription(text) {
            if (!text || text.trim() === '') return;

            const p = document.createElement('p');
            p.textContent = text;
            p.style.marginBottom = '10px';
            p.style.animation = 'fadeIn 0.3s';
            transcriptionBox.appendChild(p);

            // Auto-scroll to bottom
            transcriptionBox.scrollTop = transcriptionBox.scrollHeight;

            // Update word count
            stats.words += text.split(/\s+/).filter(w => w.length > 0).length;
            updateStats();
        }

        function clearTranscription() {
            transcriptionBox.innerHTML = '';
            stats.words = 0;
            stats.transcriptions = 0;
            stats.efficiency = 0;
            updateStats();
        }

        function updateStatus(text, connected) {
            statusText.textContent = text;
            if (connected) {
                statusIndicator.classList.add('connected');
            } else {
                statusIndicator.classList.remove('connected');
            }
        }

        function showError(message) {
            if (message) {
                errorBox.textContent = message;
                errorBox.classList.add('show');
            } else {
                errorBox.classList.remove('show');
            }
        }

        function updateStats() {
            wordCount.textContent = stats.words;
            transcriptionCount.textContent = stats.transcriptions;
            efficiency.textContent = Math.round(stats.efficiency) + '%';
        }

        function updateDuration() {
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                duration.textContent = elapsed + 's';
                stats.duration = elapsed;
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (isRecording) {
                stopRecording();
            }
            if (websocket) {
                websocket.close();
            }
        });

        // Add fade-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-5px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        console.log('Medical Dictation Frontend Ready (VAD-enabled)');
        console.log('WebSocket URL:', WS_URL);
        console.log('Click "Connect" to start');
    </script>
</body>
</html>
